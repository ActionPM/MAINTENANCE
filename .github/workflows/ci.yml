name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Auto-format and push if needed
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          pnpm format
          if [ -n "$(git diff --name-only)" ]; then
            echo "Prettier formatted the following files:"
            git diff --name-only
            if [ "${EVENT_NAME}" = "pull_request" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add -A
              git commit -m "style: auto-format with Prettier (CI)"
              git push origin HEAD:${TARGET_BRANCH}
              echo "::notice::Auto-formatted and pushed. CI will re-run."
            else
              echo "::error::Prettier drift detected on ${TARGET_BRANCH}. Run 'pnpm format' locally and commit the result."
            fi
            exit 1
          fi
          echo "All files formatted correctly."

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
    env:
      # Tests use in-memory stubs, no real DB or LLM needed
      DATABASE_URL: ''
      ANTHROPIC_API_KEY: ''

  regression-evals:
    name: Regression Evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wo-agent/evals eval:run --dataset regression --adapter fixture
    env:
      DATABASE_URL: ''
      ANTHROPIC_API_KEY: ''

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wo-agent/web build
    env:
      DATABASE_URL: ''
      ANTHROPIC_API_KEY: ''

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build-web, test, regression-evals]
    # Migrations run only on push-to-main (after all CI jobs pass).
    # NOT in Vercel build hooks — preview deploys share prod env vars (OR-10).
    # Does NOT block Vercel's parallel deploy — see OR-08 limitation below.
    # Fails if DATABASE_URL is missing (fail-closed for production).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: pnpm --filter @wo-agent/db migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
