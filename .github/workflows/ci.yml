name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Debug — show what Prettier wants to change
        if: always()
        run: |
          npx prettier --write apps/web/src/components/chat-shell.tsx docs/spec-gap-tracker.md packages/core/src/orchestrator/response-builder.ts packages/schemas/src/__tests__/validators.test.ts
          git diff --stat
          git diff -- packages/core/src/orchestrator/response-builder.ts | head -60
          git diff -- apps/web/src/components/chat-shell.tsx | head -60
          git checkout -- .
      - run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
    env:
      # Tests use in-memory stubs, no real DB or LLM needed
      DATABASE_URL: ''
      ANTHROPIC_API_KEY: ''

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wo-agent/web build
    env:
      DATABASE_URL: ''
      ANTHROPIC_API_KEY: ''
